version: '3'

networks:
  attack_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.3.0/24
  victim_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24

services:

  attacker:
    build:
      context: ./attacker
      dockerfile: Dockerfile
    container_name: attacker
    networks:
      attack_net:
        ipv4_address: 10.0.3.20
    cap_add:
      - NET_ADMIN    # Required for custom routing and offloading configuration
      - NET_RAW      # Required for Scapy raw socket access
    volumes:
      - ./shared:/shared
    tty: true

  router:
    build:
      context: ./router
      dockerfile: Dockerfile
    container_name: router
    networks:
      attack_net:
        ipv4_address: 10.0.3.5
      victim_net:
        ipv4_address: 10.0.2.5
    cap_add:
      - NET_ADMIN    # Required for iptables rule management
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
    privileged: true
    volumes:
      - ./shared:/shared
    tty: true

  victim:
    build:
      context: ./victim
      dockerfile: Dockerfile
    container_name: victim
    networks:
      victim_net:
        ipv4_address: 10.0.2.20
    cap_add:
      - NET_ADMIN
    privileged: true
    sysctls:
      - net.ipv4.ipfrag_max_dist=64   # Permit fragment gaps and overlaps for reassembly demonstration
      - net.ipv4.ipfrag_time=60        # Fragment reassembly timeout (seconds)
      - net.ipv4.conf.all.rp_filter=0  # Disable reverse path filtering
    volumes:
      - ./shared:/shared
    tty: true
